# Mosquitto MQTT Broker — Herbute
listener 1883
listener 9001
protocol websockets

# Authentification
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistance
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest stdout
log_type error
log_type warning
log_type information

# Limites connexions
max_connections 500
max_inflight_messages 100
message_size_limit 1048576
