# ── Upstream ──────────────────────────────────────────────
upstream frontend  { server frontend:3000;   keepalive 32; }
upstream backend   { server backend:2065;    keepalive 32; }
upstream backend_ia{ server backend-ia:5001; keepalive 16; }

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS principal ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN:-localhost};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    client_max_body_size 20M;

    # ── Frontend Next.js ──────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── API Backend Node.js ───────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # ── WebSocket Socket.io ───────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Service IA Python ─────────────────────────────────
    location /ia/ {
        rewrite            ^/ia/(.*) /$1 break;
        proxy_pass         http://backend_ia;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 120s;   # YOLO peut prendre du temps
    }

    # ── Fichiers uploads (statique) ───────────────────────
    location /uploads/ {
        alias         /var/www/uploads/;
        expires       30d;
        add_header    Cache-Control "public, immutable";
        access_log    off;
    }
}
