version: '3.9'

# Surcharge prod : pas de ports exposés sauf nginx, ressources limitées
services:

  mongo:
    ports: []   # Pas d'exposition en prod
    deploy:
      resources:
        limits:   { memory: 1g }
        reservations: { memory: 512m }

  redis:
    ports: []
    deploy:
      resources:
        limits:   { memory: 512m }
        reservations: { memory: 128m }

  backend:
    ports: []
    deploy:
      replicas: 2
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 256m }
      restart_policy:
        condition: on-failure
        max_attempts: 3

  backend-ia:
    ports: []
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 512m }

  frontend:
    ports: []
    deploy:
      replicas: 2
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 256m }

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/certs:ro   # Certificats SSL Let's Encrypt
      - uploads-data:/var/www/uploads:ro
