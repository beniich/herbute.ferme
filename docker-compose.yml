# Orchestration Globale — Herbute

services:
  # 🍃 MongoDB (Persistance)
  mongodb:
    image: mongo:latest
    container_name: herbute-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  # ⚡ Redis (Cache & Queue)
  redis:
    image: redis:alpine
    container_name: herbute-redis
    ports:
      - "6379:6379"
    restart: always

  # 🌐 Nginx Reverse Proxy (Entry Point)
  gateway:
    image: nginx:alpine
    container_name: herbute-gateway
    ports:
      - "80:80"
    volumes:
      - ./devops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - ia-service
    restart: always

  # 🛡️ Main Backend (Layered / Clean Architecture)
  backend:
    build:
      context: ./herbute-backend
      dockerfile: Dockerfile
    container_name: herbute-backend
    # ports: - "2065:2065" -> Maintenant accessible via Nginx
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./herbute-backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/herbute
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always

  # 🤖 IA Service (YOLO Inférence)
  ia-service:
    build:
      context: ./backend-ia
      dockerfile: Dockerfile
    container_name: herbute-ia
    # ports: - "5001:5001" -> Maintenant accessible via Nginx /ia/
    volumes:
      - ./backend-ia/models:/app/models
    restart: always

  # 🖥️ Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: herbute-frontend
    # ports: - "3000:3000" -> Maintenant accessible via Nginx /
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_IA_URL=/ia
    restart: always


# Volumes persistants
volumes:
  mongo-data:
  redis-data:
