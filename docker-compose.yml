version: '3.9'

# ════════════════════════════════════════════════════════════
#  HERBUTE — Docker Compose Multi-Service
#  Dev  : docker compose --profile dev up -d
#  Prod : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ════════════════════════════════════════════════════════════

networks:
  herbute-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo-data:
  redis-data:
  uploads-data:
  models-data:
  mqtt-data:
  nginx-certs:

services:

  # ── 1. MONGODB ────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: herbute-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-herbute2025}
      MONGO_INITDB_DATABASE:      herbute
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      herbute-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 2. REDIS ──────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: herbute-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-herbute2025}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      herbute-net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-herbute2025}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 3. MQTT BROKER ────────────────────────────────────────
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: herbute-mqtt
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mqtt-data:/mosquitto/data
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      herbute-net:
        ipv4_address: 172.20.0.12
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health",
             "-m", "ping", "-u", "${MQTT_USER:-herbute}", "-P", "${MQTT_PASS:-herbute2025}"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 4. BACKEND NODE.JS ────────────────────────────────────
  backend:
    build:
      context: ./herbute-backend
      dockerfile: Dockerfile
      target: production
    container_name: herbute-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:        production
      PORT:            2065
      MONGO_URI:       mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-herbute2025}@mongo:27017/herbute?authSource=admin
      REDIS_URL:       redis://:${REDIS_PASSWORD:-herbute2025}@redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      MQTT_HOST:       mqtt
      MQTT_PORT:       1883
      INTERNAL_IA_URL: http://backend-ia:5001
    volumes:
      - uploads-data:/app/uploads
    ports:
      - "2065:2065"
    networks:
      herbute-net:
        ipv4_address: 172.20.0.20
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2065/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 5. SERVICE IA PYTHON ──────────────────────────────────
  backend-ia:
    build:
      context: ./backend-ia
      dockerfile: Dockerfile
      target: production
    container_name: herbute-ia
    restart: unless-stopped
    env_file: .env
    environment:
      PORT:             5001
      DEBUG:            "false"
      MONGO_URI:        mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-herbute2025}@mongo:27017/herbute?authSource=admin
      MQTT_HOST:        mqtt
      MQTT_PORT:        1883
      BACKEND_URL:      http://backend:2065
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - models-data:/app/models/ml
      - uploads-data:/app/uploads
    ports:
      - "5001:5001"
    networks:
      herbute-net:
        ipv4_address: 172.20.0.30
    depends_on:
      mongo: { condition: service_healthy }
      mqtt:  { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── 6. FRONTEND NEXT.JS ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL:          ${NEXT_PUBLIC_API_URL:-http://localhost:2065}
        NEXT_PUBLIC_SOCKET_URL:       ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:2065}
        NEXT_PUBLIC_IA_URL:           ${NEXT_PUBLIC_IA_URL:-http://localhost:5001}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: herbute-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT:     3000
    ports:
      - "3000:3000"
    networks:
      herbute-net:
        ipv4_address: 172.20.0.40
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── 7. NGINX REVERSE PROXY ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: herbute-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs
      - uploads-data:/var/www/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      herbute-net:
        ipv4_address: 172.20.0.50
    depends_on: [frontend, backend, backend-ia]

  # ── 8. MQTT → MONGO BRIDGE ────────────────────────────────
  mqtt-bridge:
    build:
      context: ./backend-ia
      dockerfile: Dockerfile.bridge
    container_name: herbute-mqtt-bridge
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-herbute2025}@mongo:27017/herbute?authSource=admin
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-herbute}
      MQTT_PASS: ${MQTT_PASS:-herbute2025}
    networks:
      - herbute-net
    depends_on:
      mongo: { condition: service_healthy }
      mqtt:  { condition: service_healthy }

  # ── 9. IOT SIMULATOR (dev seulement) ─────────────────────
  iot-simulator:
    build:
      context: ./backend-ia
      dockerfile: Dockerfile.simulator
    container_name: herbute-iot-sim
    restart: unless-stopped
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-herbute}
      MQTT_PASS: ${MQTT_PASS:-herbute2025}
    networks:
      - herbute-net
    depends_on: [mqtt]
    profiles: [dev]   # docker compose --profile dev up
