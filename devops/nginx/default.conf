# Configuration Nginx — Herbute Reverse Proxy

# Redirection vers le backend pour l'API
upstream backend_api {
    server backend:2065;
}

# Redirection vers le frontend Next.js
upstream frontend_app {
    server frontend:3000;
}

# Redirection vers le service IA
upstream ia_service {
    server ia-service:5001;
}

server {
    listen 80;
    server_name localhost;

    # Sécurité : masquage de version
    server_tokens off;

    # Compression Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. API Backend
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. IA Service (Route optionnelle pour accès direct depuis le client)
    location /ia/ {
        rewrite ^/ia/(.*) /$1 break;
        proxy_pass http://ia_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Frontend Next.js
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Gestion des erreurs 
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
