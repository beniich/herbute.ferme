name: Herbute CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Validation du Backend
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install Dependencies
        run: cd herbute-backend && npm ci
      
      - name: Lint
        run: cd herbute-backend && npm run lint
      
      - name: Build Test
        run: cd herbute-backend && npm run build

  # 2. Validation du Frontend
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install Dependencies
        run: cd frontend && npm ci
      
      - name: Build Test
        run: cd frontend && npm run build

  # 3. Docker Build Check (Vérifie que les images se construisent sans erreur)
  docker-check:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images (dry run)
        run: |
          docker compose build --parallel
