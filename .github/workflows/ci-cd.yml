name: Herbute CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Validation du Backend
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install Dependencies (monorepo root)
        run: npm install --legacy-peer-deps
      
      - name: Lint Backend
        # Warnings only — do not block CI
        run: cd herbute-backend && npm run lint || true
      
      - name: Build Shared Package
        run: npm run build -w @reclamtrack/shared
      
      - name: Build Backend
        run: npm run build -w herbute-backend

  # 2. Validation du Frontend
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install Dependencies (monorepo root)
        run: npm install --legacy-peer-deps
      
      - name: Build Shared Package
        run: npm run build -w @reclamtrack/shared
      
      - name: Build Frontend
        run: npm run build -w reclamtrack-frontend

  # 3. Docker Build Check
  docker-check:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images (dry run)
        run: docker compose build --parallel
